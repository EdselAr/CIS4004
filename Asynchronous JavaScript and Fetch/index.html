<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Falling Glowing Music Notes</title>
    <style>
        /* 1. Set up the dark canvas */
        body {
            margin: 0;
            padding: 0;
            background-color: #05000a; /* Deep dark purple/black */
            overflow: hidden; /* Stops scrollbars from appearing */
            height: 100vh;
            width: 100vw;
        }

        /* 2. Base styling for the music note */
        .note {
            position: absolute;
            top: -10vh; /* Start just above the screen */
            user-select: none; /* Prevents user from highlighting the notes */
            animation: fall linear forwards;
        }

        /* 3. The falling animation */
        @keyframes fall {
            0% {
                transform: translateY(0) rotate(-15deg);
            }
            100% {
                /* Fall to the bottom, adding a slight rotation */
                transform: translateY(115vh) rotate(15deg); 
            }
        }
    </style>
</head>
<body>

    <script>
        function createNote() {
            // Create a new div element
            const note = document.createElement('div');
            note.classList.add('note');

            // Array of different HTML entities for music notes
            const noteShapes = ['&#9833;', '&#9834;', '&#9835;', '&#9836;']; 
            note.innerHTML = noteShapes[Math.floor(Math.random() * noteShapes.length)];

            // Define the color palette (pinks, purples, white)
            const colors = ['#d8b4e2', '#a64d79', '#674ea7', '#ffffff', '#ff00ff', '#8a2be2'];
            
            // Randomize properties to create depth
            const leftPosition = Math.random() * 100; // Random horizontal start (0 to 100vw)
            const animationDuration = Math.random() * 5 + 4; // Fall duration between 4s and 9s
            const size = Math.random() * 20 + 12; // Note size between 12px and 32px
            const color = colors[Math.floor(Math.random() * colors.length)]; // Pick a random color
            const opacity = Math.random() * 0.6 + 0.2; // Opacity between 0.2 and 0.8

            // Apply the randomized styles
            note.style.left = `${leftPosition}vw`;
            note.style.animationDuration = `${animationDuration}s`;
            note.style.fontSize = `${size}px`;
            note.style.color = color;
            note.style.opacity = opacity;
            
            // Apply the neon glow effect using text-shadow
            note.style.textShadow = `0 0 ${size / 2}px ${color}, 0 0 ${size}px ${color}`;

            // Add the note to the webpage
            document.body.appendChild(note);

            // Clean up: remove the note from the DOM after it finishes falling 
            setTimeout(() => {
                note.remove();
            }, animationDuration * 1000);
        }

        // Spawn a new note every 150 milliseconds
        setInterval(createNote, 150);
    </script>
</body>
</html>
